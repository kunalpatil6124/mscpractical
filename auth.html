<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | MSC-Practical ZBPC</title>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Site stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body.auth-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #02040a;
        }

        .auth-card {
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 56px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
        }

        .auth-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), transparent 50%, rgba(139, 92, 246, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .lock-animation {
            width: 80px;
            height: 80px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--accent-primary);
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: -0.04em;
        }

        .auth-card p {
            color: var(--text-main);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 28px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .input-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-box i:first-child {
            position: absolute;
            left: 16px;
            color: var(--text-dim);
            width: 18px;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 48px 16px 48px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        /* Password Toggle */
        .toggle-password {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--text-bright);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-primary);
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.5);
            filter: brightness(1.1);
        }

        .error-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #ef4444;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-card reveal">
        <div class="lock-animation">
            <i data-lucide="shield-check" style="width: 40px; height: 40px;"></i>
        </div>
        <h1>System Protected</h1>
        <p>Access requires administrative authorization</p>

        <form id="loginForm">
            <div class="form-group">
                <label>
                    <i data-lucide="key-round" style="width: 14px; height: 14px;"></i>
                    Private Access Key
                </label>
                <div class="input-box">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••" required autofocus>
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
                        <i data-lucide="eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span>Unlock Portal</span>
                <i data-lucide="arrow-right" id="btnIcon"></i>
                <div class="spinner" id="spinner" style="display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            </button>

            <div id="errorMessage" class="error-msg">
                <i data-lucide="alert-triangle" style="width: 16px; height: 16px;"></i>
                <span>Authentication Failed</span>
            </div>
        </form>

        <div style="margin-top: 48px; font-size: 0.7rem; color: var(--text-dim); display: flex; align-items: center; justify-content: center; gap: 16px;">
            <span><span class="status-dot"></span> System Online</span>
            <span>&copy; 2026 Kunal Patil</span>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
        
        if (typeof isUserAuthenticated === 'function' && isUserAuthenticated()) {
            window.location.href = 'index.html';
        }

        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const loginBtn = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');
        const btnIcon = document.getElementById('btnIcon');
        const errorMessage = document.getElementById('errorMessage');
        const btnText = loginBtn.querySelector('span');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Update icon
            const iconName = type === 'password' ? 'eye' : 'eye-off';
            eyeIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            
            loginBtn.disabled = true;
            btnText.textContent = 'Verifying';
            spinner.style.display = 'block';
            btnIcon.style.display = 'none';
            errorMessage.style.display = 'none';

            setTimeout(() => {
                if (typeof login === 'function' && login(password)) {
                    btnText.textContent = 'Authorized';
                    spinner.style.display = 'none';
                    loginBtn.style.background = '#10b981';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 400);
                } else {
                    loginBtn.disabled = false;
                    btnText.textContent = 'Unlock Portal';
                    spinner.style.display = 'none';
                    btnIcon.style.display = 'block';
                    errorMessage.style.display = 'flex';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 800);
        });
    </script>
</body>
</html>
